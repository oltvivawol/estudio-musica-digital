    <title>Estudio de Música Digital · VAWOL Arte</title>
    <script>
      // Contraparte de public/404.html: si venimos de una redirección por una
      // ruta no encontrada por GitHub Pages, restauramos la URL real antes
      // de que React Router monte, para que aterrice en la ruta correcta.
      (function () {
        var params = new URLSearchParams(location.search);
        var ruta = params.get('p');
        if (ruta) history.replaceState(null, '', ruta);
      })();
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
